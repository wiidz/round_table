# ADR-0014 seed — decision review brief template
meta:
  title: 裁决型评审
  description: 围绕 Topic 形成可执行共识；适合是否上线、是否批准类议题

topic: ""

brief:
  goal: 围绕指定 Topic 形成可执行共识，并明确后续行动项
  agenda:
    - 核心结论是否成立
    - 主要风险与缓解措施
