# RoundTable server configuration (no secrets — use .env or env vars)

server:
  addr: ":7777"
  read_timeout_sec: 30
  write_timeout_sec: 30

meeting:
  max_rounds_per_segment: 5
  min_rounds_before_synthesis: 2
  max_confirmation_cycles: 3
  confirmation_mode: required
  free_dialogue_max_questions: 1

model:
  provider: deepseek
  base_url: https://api.deepseek.com/v1
  default_model: deepseek-chat
  timeout_sec: 120

storage:
  driver: memory  # memory | sqlite
  sqlite_path: ./data/roundtable.db

workspace:
  root: ./data/workspaces

profile:
  root: ./data/profiles
  templates: ./data/_templates/profiles

knowledge:
  root: ./data/knowledge
  templates: ./data/_templates/knowledge
  shared_enabled: true

# Transport adapters (secrets in .env — see DISCORD_BOT_TOKEN)
transport:
  discord:
    enabled: false
    allow_dm: true
    allow_guild: true
    guild_id: ""   # optional: restrict bot to one Discord server ID
