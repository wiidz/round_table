# RoundTable server configuration (no secrets — use .env or env vars)

server:
  addr: ":7777"
  read_timeout_sec: 30
  write_timeout_sec: 30
  locale: zh   # en | zh — user-facing copy (Discord, …)

meeting:
  default_mode: deliberation
  max_rounds_per_segment: 5
  min_rounds_before_synthesis: 2
  max_confirmation_cycles: 3
  confirmation_mode: required
  free_dialogue_max_questions: 1
  llm_moderator_round_summary: true   # LLM 轮间摘要；关闭则回退规则提炼 (engine/moderator.go)
  llm_moderator_executive_recap: true # 合成前 Executive Recap → moderator/executive-recap.md

model:
  provider: deepseek
  base_url: https://api.deepseek.com/v1
  default_model: deepseek-chat
  timeout_sec: 120

storage:
  driver: sqlite  # memory | sqlite
  sqlite_path: ./data/roundtable.db

workspace:
  root: ./data/workspaces

profile:
  root: ./data/profiles
  templates: ./data/_templates/profiles

knowledge:
  root: ./data/knowledge
  templates: ./data/_templates/knowledge
  shared_enabled: true

# Transport adapters (secrets in .env — see DISCORD_BOT_TOKEN)
transport:
  discord:
    auto_start: false
    enabled: false
    allow_dm: true
    allow_guild: true
    guild_id: ""   # optional: restrict bot to one Discord server ID
    command_prefix: "!rt"
    bindings_file: ./data/transport/discord-principal.json
    meet_participants: "designer:游戏策划:gameplay,player:玩家代表:experience,dev:开发:backend,ops:运维:infra"
    # meet_mode / meet_max_rounds — use meeting.* in server.yaml or Web 设置 → 会议
    meet_confirmation: skip
    meet_free_dialogue_questions: 0
    reception_agent_enabled: true   # LLM reception router for NL queries (ADR-0012); needs model API key
    # Participant bots speak as themselves; tokens in .env as DISCORD_BOT_TOKEN_<ID>
    participant_bots: "designer,player,dev,ops"
