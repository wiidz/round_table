# RoundTable — Docker Compose (Ubuntu / Linux server)
#
# Quick start:
#   cp deploy/.env.example .env
#   docker compose up -d --build discord
#
# Build behind ShellCrash (mixed-port 4567 on host):
#   HTTP_PROXY=http://127.0.0.1:4567 HTTPS_PROXY=http://127.0.0.1:4567 docker compose build discord

name: roundtable

services:
  discord:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
    image: roundtable/server:latest
    container_name: roundtable-discord
    restart: unless-stopped
    # Share host network so 127.0.0.1:4567 reaches ShellCrash (mixed-port often binds localhost only).
    network_mode: host
    command: ["roundtable-discord"]
    env_file:
      - path: .env
        required: true
    environment:
      ROUND_TABLE_ROOT: /app/apps/server
      ROUND_TABLE_WORKSPACE_ROOT: /app/data/workspaces
      ROUND_TABLE_PROFILE_ROOT: /app/data/profiles
      ROUND_TABLE_PROFILE_TEMPLATES: /app/data/_templates/profiles
      ROUND_TABLE_KNOWLEDGE_ROOT: /app/data/knowledge
      ROUND_TABLE_KNOWLEDGE_TEMPLATES: /app/data/_templates/knowledge
      ROUND_TABLE_DISCORD_BINDINGS_FILE: /app/data/transport/discord-principal.json
      http_proxy: ${http_proxy:-}
      https_proxy: ${https_proxy:-}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      no_proxy: ${no_proxy:-localhost,127.0.0.1}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1}
    volumes:
      - workspaces:/app/data/workspaces
      - profiles:/app/data/profiles
      - knowledge:/app/data/knowledge
      - transport:/app/data/transport
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  server:
    profiles: ["http"]
    image: roundtable/server:latest
    container_name: roundtable-server
    restart: unless-stopped
    command: ["roundtable-server"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - path: .env
        required: true
    environment:
      ROUND_TABLE_ROOT: /app/apps/server
      ROUND_TABLE_ADDR: ":7777"
    ports:
      - "${ROUND_TABLE_HTTP_PORT:-7777}:7777"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7777/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  workspaces:
  profiles:
  knowledge:
  transport:
